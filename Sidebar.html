<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body { font-family: Arial, sans-serif; padding: 14px; }
    label { font-weight: 600; display: block; margin-top: 10px; }
    input, textarea { width: 100%; box-sizing: border-box; padding: 8px; margin-top: 6px; }
    button { margin-top: 14px; width: 100%; padding: 12px; font-weight: 700; cursor: pointer; }
    .small { font-size: 12px; opacity: 0.9; }
    .ok { color: #0a7; }
    .ng { color: #c00; white-space: pre-wrap; }
    .loading { color: #444; }
  </style>
</head>
<body>
  <div class="small">Generate professional trainer education slides with a multi-stage AI pipeline.</div>

  <label>Title</label>
  <input id="title" value="Safe Stretching & Coaching Fundamentals">

  <label>Theme</label>
  <textarea id="theme" rows="5">Design a high-quality training for professional trainers on safe stretching instruction, elderly exercise precautions, and practical coaching workflow.</textarea>

  <label>Page Count (10-20)</label>
  <input id="pageCount" type="number" min="10" max="20" value="12">

  <label>Audience</label>
  <input id="audience" value="Fitness and rehabilitation trainers working with middle-aged and elderly clients">

  <label>Tone</label>
  <input id="tone" value="Professional, practical, safety-first, and field-oriented">

  <label>Template Presentation ID (optional)</label>
  <input id="templatePresentationId" placeholder="e.g. 1AbC... (between /d/ and /edit)">

  <button type="button" id="runBtn">Generate slides</button>
  <div id="status" class="small" style="margin-top:10px;"></div>

  <script>
    const statusEl = document.getElementById('status');
    const runBtn = document.getElementById('runBtn');

    runBtn.addEventListener('click', run);

    function run() {
      runBtn.disabled = true;
      statusEl.className = 'small loading';
      statusEl.textContent = 'Generating...';

      const input = {
        title: document.getElementById('title').value.trim(),
        theme: document.getElementById('theme').value.trim(),
        pageCount: Number(document.getElementById('pageCount').value),
        audience: document.getElementById('audience').value.trim(),
        tone: document.getElementById('tone').value.trim(),
        templatePresentationId: document.getElementById('templatePresentationId').value.trim(),
      };

      google.script.run
        .withSuccessHandler(function(res) {
          runBtn.disabled = false;
          statusEl.className = 'small ok';

          const sections = Array.isArray(res.sections)
            ? res.sections.map(s => `- ${s}`).join('<br>')
            : '(none)';

          statusEl.innerHTML =
            'Success<br>' +
            `<a href="${res.presentationUrl}" target="_blank">Open Slides</a><br>` +
            `Slide count: ${res.slideCount}<br>` +
            `Curriculum sections:<br>${sections}`;
        })
        .withFailureHandler(function(err) {
          runBtn.disabled = false;
          statusEl.className = 'small ng';
          statusEl.textContent = 'Error\n' + (err && err.message ? err.message : JSON.stringify(err));
        })
        .generateTrainingSlidesFromUi(input);
    }
  </script>
</body>
</html>
